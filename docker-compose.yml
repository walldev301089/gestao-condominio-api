services:
  db:
    image: postgres:15
    container_name: condominio-db
    environment:
      - POSTGRES_DB=condominio_db
      - POSTGRES_USER=wallace
      # 'trust' permite conectar sem senha apenas para desenvolvimento local
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallace -d condominio_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: